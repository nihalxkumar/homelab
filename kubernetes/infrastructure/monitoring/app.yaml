apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "66.0.0"
    helm:
      releaseName: monitoring
      values: |
        grafana:
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: 'default'
                orgId: 1
                folder: ''
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              traefik:
                gnetId: 11462
                revision: 29
                datasource: Prometheus
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus
              node-exporter-full:
                gnetId: 1860
                revision: 37
                datasource: Prometheus
          ingress:
            enabled: true
            ingressClassName: tailscale
            annotations:
              tailscale.com/funnel: "false"
            hosts:
              - grafana
            tls:
              - hosts:
                  - grafana
          persistence:
            enabled: true
            storageClassName: local-path
            size: 2Gi
        prometheus:
          ingress:
            enabled: true
            ingressClassName: tailscale
            annotations:
              tailscale.com/funnel: "false"
            hosts:
              - prometheus
            tls:
              - hosts:
                  - prometheus
          prometheusSpec:
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        alertmanager:
          enabled: true
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
