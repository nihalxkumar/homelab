apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  source:
    repoURL: https://pkgs.tailscale.com/helmcharts
    chart: tailscale-operator
    targetRevision: "1.78.3"
    helm:
      releaseName: tailscale-operator
      values: |
        # OAuth credentials for the operator
        oauth:
          clientId: ""
          clientSecret: ""
        
        # Use existing secret instead
        operatorConfig:
          hostname: "homelab-operator"
          
        # API server proxy configuration
        apiServerProxyConfig:
          mode: "true"
        
        # Proxy configuration
        proxyConfig:
          defaultTags:
            - "tag:k8s"
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
