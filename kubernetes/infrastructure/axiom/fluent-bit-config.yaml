apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: axiom
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              systemd
        Tag               systemd.*
        Read_From_Tail    On
        Strip_Underscores On

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off

    [OUTPUT]
        Name   http
        Match  *
        Host   api.axiom.co
        Port   443
        URI    /v1/datasets/${AXIOM_DATASET}/ingest
        Header Authorization Bearer ${AXIOM_API_TOKEN}
        Header X-Axiom-Org-ID ${AXIOM_ORG_ID}
        tls    On
        tls.verify Off
        json_date_key timestamp
        json_date_format iso8601
        format json

  parsers.conf: |
    [PARSER]
        Name   docker
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep On
