apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: traefik
  annotations:
    glance/url: https://argocd.nihalxkumar.dev
    glance/icon: si:argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.nihalxkumar.dev`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
          namespace: argocd
  tls:
    secretName: nihalxkumar-dev-tls
