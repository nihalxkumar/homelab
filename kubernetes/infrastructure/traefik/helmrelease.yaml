apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "28.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    # Global settings
    deployment:
      replicas: 1
    
    # Expose Traefik metrics for Prometheus
    metrics:
      prometheus:
        enabled: true
    
    # Log level
    logs:
      general:
        level: INFO
      access:
        enabled: true
    
    # EntryPoints - HTTP on 80, HTTPS on 443
    ports:
      web:
        port: 80
        expose:
          default: true
        exposedPort: 80
        protocol: TCP
        redirectTo:
          port: websecure
          priority: 10
      websecure:
        port: 443
        expose:
          default: true
        exposedPort: 443
        protocol: TCP
        tls:
          enabled: true
          options: default
          certResolver: letsencrypt
          domains:
            - main: nihalxkumar.dev
              sans:
                - "*.nihalxkumar.dev"
      metrics:
        port: 8080
        expose: false
        protocol: TCP
    
    # Persistence for certificates
    persistence:
      enabled: true
      storageClass: local-path
      size: 128Mi
      path: /data
      annotations: {}
    
    # RBAC
    rbac:
      enabled: true
    
    # ServiceAccount
    serviceAccount:
      enabled: true
      name: traefik
    
    # Global router configuration
    globalArguments:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
    
    # Additional arguments for certificate resolution
    additionalArguments:
      - "--certificatesresolvers.letsencrypt.acme.email=admin@nihalxkumar.dev"
      - "--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=false"
