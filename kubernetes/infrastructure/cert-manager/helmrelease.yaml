apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: "v1.14.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    crds: create
  upgrade:
    crds: create
  values:
    global:
      leaderElection:
        namespace: cert-manager
    
    installCRDs: true
    
    serviceAccount:
      create: true
      name: cert-manager
    
    securityContext:
      fsGroup: 1001
      runAsNonRoot: true
      runAsUser: 1001
    
    # Enable webhook
    webhook:
      enabled: true
      securePort: 10250
    
    # Global configuration
    config:
      issuers: []
