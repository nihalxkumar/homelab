apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nihalxkumar-dev
  namespace: argocd
spec:
  secretName: nihalxkumar-dev-tls
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
  commonName: nihalxkumar.dev
  dnsNames:
    - nihalxkumar.dev
    - "*.nihalxkumar.dev"
    - argocd.nihalxkumar.dev
    - irc.nihalxkumar.dev
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
