apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cert-manager

resources:
  - helmrelease.yaml
  - clusterissuer.yaml
  - certificate.yaml
  # cloudflare-api-token secret is created manually and maintained separately
  # (SOPS encryption is incompatible with ArgoCD sync)
  # - secrets/cloudflare-secret.yaml
  # selfsigned-issuer.yaml removed: uses same name/namespace as certificate.yaml
  # (was actually using letsencrypt-prod, not self-signed)
