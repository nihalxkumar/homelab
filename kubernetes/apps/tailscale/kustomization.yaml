apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tailscale

resources:
  - namespace.yaml

generators:
  - secret-generator.yaml

helmCharts:
  - name: tailscale-operator
    repo: https://pkgs.tailscale.com/helmcharts
    version: 1.78.3
    releaseName: tailscale-operator
    namespace: tailscale
    valuesFile: values.yaml
