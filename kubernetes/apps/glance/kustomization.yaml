apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
   - namespace.yaml
   - configmap.yaml
   - glance-k8s-serviceaccount.yaml
   - glance-k8s-rbac.yaml
   - glance-k8s-deployment.yaml
   - glance-k8s-service.yaml
   - pvc.yaml
   - deployment.yaml
   - service.yaml
   - ingress.yaml
   - certificate.yaml

generators:
   - secret-generator.yaml

images:
  - name: glanceapp/glance
    newTag: "v0.8.4"
  - name: busybox
    newTag: "1.36.1"
