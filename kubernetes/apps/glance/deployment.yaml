apiVersion: apps/v1
kind: Deployment
metadata:
  name: glance
  namespace: glance
  annotations:
    glance/url: https://maya.nihalxkumar.dev
    glance/icon: di:glance
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: glance
  template:
    metadata:
      labels:
        app: glance
      annotations:
        # Reloader: Automatically restart pods when ConfigMaps/Secrets change
        # Watches all ConfigMaps/Secrets referenced by this pod
        reloader.stakater.com/auto: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      # Init container to copy config files from ConfigMap to PVC
      # Always copies to ensure ConfigMap updates are applied
      initContainers:
        - name: init-config
          image: busybox:latest
          command: ['sh', '-c']
          args:
            - |
              # Debug: Log init container startup
              echo "Initializing Glance config files..."
              # Always overwrite config files to ensure ConfigMap updates are applied
              echo "Copying glance.yml..."
              cp -f /config/glance.yml /app/config/glance.yml
              echo "Copying home.yml..."
              cp -f /config/home.yml /app/config/home.yml
              echo "Config initialization complete"
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: configmap-config
              mountPath: /config
      containers:
        - name: glance
          image: glanceapp/glance:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: assets
              mountPath: /app/assets
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          # Debug: Log container startup
          env:
            - name: TZ
              value: "UTC"
            - name: LASTFM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glance-secrets
                  key: LASTFM_API_KEY
                  optional: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: glance-config
        - name: assets
          emptyDir: {}
        - name: configmap-config
          configMap:
            name: glance-config
