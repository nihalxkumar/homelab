apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: thelounge
  namespace: thelounge
  annotations:
    glance/url: https://irc.nihalxkumar.dev
    glance/icon: si:liberadotchat
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`irc.nihalxkumar.dev`)
      kind: Rule
      middlewares:
        - name: traefik-tailscale-only@kubernetescrd
      services:
        - name: thelounge
          port: 9000
  tls:
    secretName: nihalxkumar-dev-tls
