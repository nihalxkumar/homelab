---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: n8n

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - pvc.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - certificate.yaml
  - networkpolicy.yaml
  - backup-cronjob.yaml

generators:
  - secret-generator.yaml

commonLabels:
  app.kubernetes.io/name: n8n
  app.kubernetes.io/instance: n8n
  app.kubernetes.io/component: workflow-automation
  app.kubernetes.io/part-of: homelab

images:
  - name: n8nio/n8n
    newTag: "1.20.0"
