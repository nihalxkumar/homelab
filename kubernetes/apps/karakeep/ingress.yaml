apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: karakeep
  namespace: karakeep
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`karakeep.nihalxkumar.dev`)
      kind: Rule
      services:
        - name: karakeep
          port: 80
  tls:
    secretName: nihalxkumar-dev-tls
