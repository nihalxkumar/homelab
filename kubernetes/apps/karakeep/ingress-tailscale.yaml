apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karakeep-tailscale
  namespace: karakeep
  annotations:
    tailscale.com/funnel: "false"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - karakeep
  rules:
    - host: karakeep
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: karakeep
                port:
                  number: 80
