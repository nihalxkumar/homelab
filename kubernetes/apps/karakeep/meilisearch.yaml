apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-meilisearch
  namespace: karakeep
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: karakeep-meilisearch
  template:
    metadata:
      labels:
        app: karakeep-meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.11
          env:
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-secrets
                  key: MEILI_MASTER_KEY
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_ENV
              value: "production"
          ports:
            - containerPort: 7700
          volumeMounts:
            - name: data
              mountPath: /meili_data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: karakeep-meili-data
---
apiVersion: v1
kind: Service
metadata:
  name: karakeep-meilisearch
  namespace: karakeep
spec:
  selector:
    app: karakeep-meilisearch
  ports:
    - protocol: TCP
      port: 7700
      targetPort: 7700
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: karakeep-meili-data
  namespace: karakeep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
