apiVersion: apps/v1
kind: Deployment
metadata:
  name: landing
  namespace: landing
  labels:
    app: landing
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: landing
  template:
    metadata:
      labels:
        app: landing
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: landing-files
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      volumes:
        - name: landing-files
          configMap:
            name: landing-files
        - name: nginx-config
          configMap:
            name: landing-nginx-config