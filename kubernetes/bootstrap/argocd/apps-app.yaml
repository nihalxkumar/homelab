apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - app: thelounge
            path: kubernetes/apps/thelounge
          - app: glance
            path: kubernetes/apps/glance
          - app: karakeep
            path: kubernetes/apps/karakeep
          - app: n8n
            path: kubernetes/apps/n8n
          - app: deepwiki-open
            path: kubernetes/apps/deepwiki-open
          - app: landing
            path: kubernetes/apps/landing
          - app: tailscale
            path: kubernetes/apps/tailscale
  template:
    metadata:
      name: '{{app}}'
      namespace: argocd
    spec:
      project: default
      source:
        repoURL: https://gitlab.com/nihalxkumar/homelab-infra.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{app}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
