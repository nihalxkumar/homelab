apiVersion: v1
kind: Secret
metadata:
  name: homelab-infra-repo
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  type: git
  url: https://gitlab.com/nihalxkumar/homelab-infra.git
  password: ""
  username: not-used
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: homelab
  namespace: argocd
spec:
  description: Homelab infrastructure project
  sourceRepos:
    - 'https://gitlab.com/nihalxkumar/homelab-infra.git'
    - 'https://helm.traefik.io/traefik'
    - 'https://charts.jetstack.io'
  destinations:
    - namespace: '*'
      server: 'https://kubernetes.default.svc'
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: traefik.io
      kind: IngressRoute
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange
