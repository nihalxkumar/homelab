apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
   - namespace.yaml
   - https://raw.githubusercontent.com/argoproj/argo-cd/v3.2.1/manifests/install.yaml
   - repo.yaml
   - root-app.yaml
   - app.yaml
   - apps-app.yaml
   - ingress-tailscale.yaml

patches:
  - path: argocd-cm-ksops-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-repo-server-ksops-patch.yaml
    target:
      kind: Deployment
      name: argocd-repo-server

configMapGenerator:
  - name: argocd-cmd-params-cm
    behavior: merge
    literals:
      - server.insecure=true
