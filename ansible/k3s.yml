---
- name: Install K3s (Single Node)
  hosts: vps
  become: true
  vars_files:
    - inventory/host_vars/vps.yml

  tasks:
    - name: System | Disable Swap (K8s Requirement)
      command: swapoff -a
      when: ansible_facts['swaptotal_mb'] > 0
    - name: System | Remove Swap from fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*?\sswap\s+sw\s+.*)$'
        replace: '# \1'

    - name: System | Install Prerequisites
      apt:
        name:
          - curl
          - open-iscsi # Required for Longhorn/storage later
          - nfs-common # Required for some PVs
        state: present
        update_cache: yes

    - name: K3s | Install K3s
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -s - server {{ k3s_server_args }}

    - name: K3s | Wait for Node to be Ready
      command: /usr/local/bin/k3s kubectl get nodes
      register: nodes_check
      until: '"Ready" in nodes_check.stdout'
      retries: 30
      delay: 5

    - name: Local | Setup Kubeconfig for User
      file:
        path: "/home/{{ k3s_admin_user }}/.kube"
        state: directory
        owner: "{{ k3s_admin_user }}"
        group: "{{ k3s_admin_user }}"
        mode: "0755"

    - name: Local | Copy Kubeconfig to User Home
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ k3s_admin_user }}/.kube/config"
        remote_src: yes
        owner: "{{ k3s_admin_user }}"
        group: "{{ k3s_admin_user }}"
        mode: "0600"

    - name: Local | Update Kubeconfig Server Address
      replace:
        path: "/home/{{ k3s_admin_user }}/.kube/config"
        regexp: "127.0.0.1"
        replace: "{{ ansible_host }}"

    - name: Fetch | Get Kubeconfig to Local Machine
      fetch:
        src: "/home/{{ k3s_admin_user }}/.kube/config" # <--- Changed from /etc/rancher...
        dest: "./k3s-vps.yaml"
        flat: yes
