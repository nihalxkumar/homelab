---
- name: Install and Configure Tailscale
  hosts: vps
  become: true
  vars:
    tailscale_auth_key: "{{ tailscale_auth_key }}"

  tasks:
    - name: Add Tailscale GPG key
      get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg

    - name: Add Tailscale repository
      get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/jammy.tailscale-keyring.list
        dest: /etc/apt/sources.list.d/tailscale.list

    - name: Install Tailscale
      apt:
        update_cache: yes
        name: tailscale
        state: latest

    - name: Enable Tailscale service
      service:
        name: tailscaled
        state: started
        enabled: yes

    - name: Authenticate Tailscale (One time run)
      command: tailscale up --authkey={{ tailscale_auth_key }} --hostname=racknerd-vps
      register: tailscale_start
      changed_when: "'Success' in tailscale_start.stdout"
      ignore_errors: yes # Ignores error if already logged in

    - name: Configure Tailscale MagicDNS and split DNS
      command: |
        tailscale set \
          --accept-dns=true \
          --advertise-tags=tag:homelab
      become: no
      register: tailscale_dns_config
      changed_when: "'Configuration changed' in tailscale_dns_config.stdout or tailscale_dns_config.rc == 0"
      ignore_errors: yes

    - name: Display Tailscale status
      command: tailscale status
      become: no
      register: tailscale_status
      changed_when: false

    - name: Show Tailscale connection info
      debug:
        msg: "{{ tailscale_status.stdout_lines[-3:] }}"
